frequency_range:
  start_hz: 1200000000
  stop_hz: 6000000000
  base_cell_bw_hz: 20000000

hardware:
  # 40 MHz: each coarse capture spans two 20 MHz cells -> ~half the retunes for
  # a full sweep (the per-rx() USB round-trip dominates, not dwell time).
  default_bandwidth_hz: 40000000
  sample_rate_hz: 40000000
  fft_size_base: 512
  adc_full_scale: 2048.0
  pll_settle_s: 0.0008
  overlap_fraction: 0.0

coarse_scan:
  fft_size: 512
  num_frames: 1
  dwell_s: 0.003

fine_scan:
  fft_size: 4096
  num_frames: 16
  dwell_s: 0.030
  welch_overlap: 0.5

cfar:
  guard_cells: 4
  training_cells: 24
  threshold_offset_db: 6.0
  min_region_bw_hz: 100000

scheduler:
  tracked_revisit_s: 0.05
  active_revisit_s: 0.10
  suspect_revisit_s: 0.20
  default_max_revisit_s: 5.0
  priority_max_revisit_s: 0.5
  short_coarse_dwell_s: 0.001
  coarse_dwell_s: 0.003
  fine_dwell_s: 0.030
  active_dwell_s: 0.020
  track_dwell_s: 0.010

states:
  suspect_prob_threshold: 0.35
  active_prob_threshold: 0.65
  confirmed_track_prob_threshold: 0.70
  quiet_prob_threshold: 0.15
  node_zoom_prob_threshold: 0.35
  node_zoom_delta_threshold_db: 8.0
  node_uncertainty_threshold: 0.7
  occupied_bin_fraction_threshold: 0.15

priority_bands:
  - name: 1.2G
    start_hz: 1200000000
    stop_hz: 1350000000
    priority_weight: 1.5
    max_revisit_s: 1.0

  - name: 2.4G
    start_hz: 2300000000
    stop_hz: 2500000000
    priority_weight: 2.0
    max_revisit_s: 0.5

  - name: 5.8G
    start_hz: 5650000000
    stop_hz: 5950000000
    priority_weight: 2.0
    max_revisit_s: 0.5

bayesian:
  enabled: false
  weight: 1.0

inference:
  enabled: false
  weight: 1.0
